# Spring
spring.application.name=BugBuster
spring.mvc.hiddenmethod.filter.enabled=true

# Activate profile based on environment
spring.profiles.active=dev

# JWT
jwt.secret=your-256-bit-secret-key-change-this-for-production
jwt.expiration.ms=86400000

# OTP
otp.expiration.minutes=5

# Scan limits
scan.limit.unregistered=5
scan.limit.registered=10

# PDF
pdf.storage.path=./reports/
pdf.max-size-mb=10

# Selenium Configuration
selenium.headless=true
selenium.timeout.seconds=30
selenium.chromedriver.path=src/main/resources/drivers/chromedriver.exe

# Disable all security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.level.com.example.bugbuster=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG